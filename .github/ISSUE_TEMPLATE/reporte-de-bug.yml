name: Reporte de bug (Spanish)
description: Ayúdanos a mejorar reportando bugs usando este formato
title: "[BUG] "
labels:
  - bug
body:
  - type: checkboxes
    id: lista-verificacion
    attributes:
      label: Lista de verificación
      options:
        - label: He buscado en los issues existentes y confirmado que esto no es un duplicado
          required: true
        - label: He discutido esto en [GitHub Discussions](https://github.com/omegaup/omegaup/discussions) o en [Discord](https://discord.gg/K3JFd9d3wk) y recibí retroalimentación positiva
          required: true
  - type: markdown
    attributes:
      value: |
        ## Comportamiento Actual

        _Describe lo pasó en lugar de lo que se esperaba_.
  - type: textarea
    id: comportamiento-actual
    attributes:
      label: Comportamiento Actual
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        ## Comportamiento Esperado

        _Describe lo que originalmente estabas intentando hacer y cómo esperabas que se comportara la plataforma._
  - type: textarea
    id: comportamiento-esperado
    attributes:
      label: Comportamiento Esperado
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        ## Si es necesario agrega la siguiente información (de lo contrario borra la sección):

        _Provee una liga a un ejemplo, o una lista de pasos detallada de cómo reproducir este bug._

            1.
            2.
            3.
            4.

        _Detalles relevantes acerca del ambiente en el que reprodujiste este bug_

            * Nombre del navegador (e.g. Chrome 39, node.js 5.4):
            * Sistema Operativo y versión (escritorio o móvil):
            * Link al sitio en el que este problema pasa:
            * Captura de pantalla:
  - type: textarea
    id: reproduccion-y-entorno
    attributes:
      label: Reproducción y entorno (opcional)
    validations:
      required: false
