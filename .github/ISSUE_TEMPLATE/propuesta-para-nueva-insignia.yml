name: Propuesta para nueva insignia (Spanish)
description: Propón una nueva insignia en omegaUp
title: "[Badge Proposal] Nombre de la Insignia"
body:
  - type: checkboxes
    id: lista-verificacion
    attributes:
      label: Lista de verificación
      options:
        - label: He buscado en los issues existentes y confirmado que esto no es un duplicado
          required: true
        - label: He discutido esto en [GitHub Discussions](https://github.com/omegaup/omegaup/discussions) o en [Discord](https://discord.gg/K3JFd9d3wk) y recibí retroalimentación positiva
          required: true
  - type: markdown
    attributes:
      value: |
        # Contenido

        Este es el template para la propuesta de insignias en omegaUp, asegúrate de haber leído las consideraciones a tener en cuenta para proponer una insignia: [Guía para proponer insignias](https://blog.omegaup.com/guia-para-la-propuesta-de-insignias-en-omegaup/).

        _Asegúrate de poner el nombre de la insignia que estás proponiendo, dentro del título de este Issue._
  - type: markdown
    attributes:
      value: |
        ## ¿Cuál es el nombre de la insignia que propones?

        _Ejemplo: Usuario Histórico_
  - type: textarea
    id: nombre-insignia
    attributes:
      label: ¿Cuál es el nombre de la insignia que propones?
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        ## ¿Qué debe haber realizado un usuario para recibir esta insignia?

        _Ejemplo: El usuario realizó algún envío dentro del primer año desde el lanzamiento de omegaUp._
  - type: textarea
    id: criterio
    attributes:
      label: ¿Qué debe haber realizado un usuario para recibir esta insignia?
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        ## ¿Esta insignia tiene un ícono personalizado?

        _De ser el caso, adjunta acá el archivo SVG con el ícono personalizado de la insignia._
  - type: textarea
    id: icono
    attributes:
      label: ¿Esta insignia tiene un ícono personalizado?
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        ## (Opcional) Si tienes una idea de cómo implementar la consulta y prueba unitaria para esta insignia, puedes ingresarla acá:

        _Ejemplo:
        Para la consulta se debería obtener el primer inicio de sesión del registro de sesiones de usuarios y verificar si se encuentra dentro del primer año desde que omegaUp fue lanzado.
        Para la prueba se deben crear dos usuarios, el primero debe iniciar sesión con fecha dentro del primer año de lanzamiento de omegaUp, el segundo debe tener un inicio de sesión con fecha actual, se espera que solo el primer usuario reciba la insignia._
  - type: textarea
    id: implementacion
    attributes:
      label: (Opcional) Implementación — consulta y prueba unitaria
    validations:
      required: false
